<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless Group Voice & Text Chat</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color-scheme: dark;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        .card {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h1, h2, h3 { margin-top: 0; color: #64b5f6; }
        
        /* Setup Screen Constraints */
        #setup-screen .input-group {
            max-width: 300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="text"], input[type="range"] {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: #2c2c2c;
            color: #ffffff;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 16px;
        }
        input[type="text"]::placeholder { color: #888; }
        
        button {
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #1565c0; }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        
        .btn-danger { background-color: #d32f2f; }
        .btn-danger:hover { background-color: #b71c1c; }
        .btn-success { background-color: #2e7d32; }
        .btn-success:hover { background-color: #1b5e20; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        /* Layout for Chat Screen */
        #chat-screen { display: none; }
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .main-layout {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .panel {
            flex: 1;
            min-width: 300px;
            background: #232323;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        /* Participant List & Volume */
        .participant-list {
            padding: 0;
            margin: 0;
            list-style: none;
        }
        .participant-list li {
            padding: 12px;
            background: #2c2c2c;
            border: 1px solid #444;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .peer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .peer-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-badge {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 12px;
            background: #555;
            color: #fff;
            font-weight: bold;
        }
        .status-badge.voice { background: #4caf50; }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            font-size: 13px;
            color: #bbb;
            margin-top: 8px;
        }
        .volume-slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .volume-slider-container input[type="range"] {
            margin: 0;
            padding: 0;
            cursor: pointer;
        }

        /* Audio Meter UI */
        .meter-bg {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }
        .meter-fill {
            height: 100%;
            background: #64b5f6;
            width: 0%;
            transition: width 0.05s ease-out, background-color 0.2s ease;
        }
        .meter-fill.local { background: #4caf50; }

        /* Text Chat */
        #chatHistory {
            flex: 1;
            height: 300px;
            overflow-y: auto;
            background: #2c2c2c;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-msg {
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 14px;
            word-wrap: break-word;
        }
        .chat-msg.self {
            background: #1976d2;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .chat-msg.other {
            background: #3d3d3d;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .chat-msg strong { font-size: 12px; display: block; margin-bottom: 2px; opacity: 0.8; }
        .chat-input-row { display: flex; gap: 10px; align-items: center; }
        .chat-input-row input { margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="setup-screen">
        <h1 style="text-align: center;">Voice & Text Room</h1>
        <p style="text-align: center; color: #aaa; margin-bottom: 30px;">Join a serverless P2P mesh network.</p>

        <div class="input-group">
            <input type="text" id="userName" placeholder="Your Name (e.g., Alice)" autocomplete="off">
            <input type="text" id="roomId" placeholder="Room Name (e.g., dev-chat-123)" autocomplete="off">
            <button id="joinBtn" style="width: 100%;">Join Room</button>
            <p id="statusText" style="color: #aaa; font-size: 14px; display: none; text-align: center; margin-top: 5px;">Connecting...</p>
        </div>
    </div>

    <div class="card" id="chat-screen">
        <div class="header-controls">
            <h2 id="roomTitle" style="margin: 0;">Room: ...</h2>
            <div class="header-buttons">
                <button id="joinVoiceBtn" class="btn-success">Join Voice</button>
                <button id="muteBtn" class="btn-success" style="display: none;">Mute My Mic</button>
                <button id="leaveBtn" class="btn-danger">Leave</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="panel">
                <h3>Participants & Audio</h3>
                <ul id="participants" class="participant-list">
                    <!-- Peers inject here -->
                </ul>
            </div>

            <div class="panel">
                <h3>Text Chat</h3>
                <div id="chatHistory"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off">
                    <button id="sendChatBtn">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="audio-container" style="display: none;"></div>

<script>
    const rtcConfig = { iceServers:[{ urls: 'stun:stun.l.google.com:19302' }] };

    let localStream = null;
    let mqttClient;
    let myId = Math.random().toString(36).substring(2, 12);
    let myName = '';
    let roomTopic = '';

    // Core State
    let inVoice = false;
    let isMuted = false;
    const peers = {}; // { peerId: { name, inVoice, pc, audioEl, analyser, volume, iceQueue } }

    // Web Audio API Elements (Only used for drawing the visual UI volume meters)
    let audioCtx;
    let localAnalyser;
    let audioDataArray;

    // UI Elements
    const setupScreen = document.getElementById('setup-screen');
    const chatScreen = document.getElementById('chat-screen');
    const joinBtn = document.getElementById('joinBtn');
    const joinVoiceBtn = document.getElementById('joinVoiceBtn');
    const muteBtn = document.getElementById('muteBtn');
    const roomIdInput = document.getElementById('roomId');
    const statusText = document.getElementById('statusText');
    const participantsList = document.getElementById('participants');
    const chatHistory = document.getElementById('chatHistory');
    const chatInput = document.getElementById('chatInput');
    const sendChatBtn = document.getElementById('sendChatBtn');

    // --- URL ROOM HANDLING ---
    window.addEventListener('load', () => {
        const roomName = window.location.hash.substring(1);
        if (roomName) roomIdInput.value = decodeURIComponent(roomName);
    });

    roomIdInput.addEventListener('input', () => {
        const val = roomIdInput.value.trim();
        window.history.replaceState(null, null, val ? "#" + encodeURIComponent(val) : window.location.pathname + window.location.search);
    });

    // --- 1. JOIN TEXT CHAT ---
    joinBtn.onclick = () => {
        myName = document.getElementById('userName').value.trim() || "Anonymous";
        const roomId = roomIdInput.value.trim();
        if (!roomId) return alert('Please enter a Room Name.');

        roomTopic = `wrtc-mesh-voice-room-${roomId}`;
        statusText.style.display = 'block';
        joinBtn.disabled = true;

        // Connect to Signaling Broker directly for text (No Mic permission yet)
        mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

        mqttClient.on('connect', () => {
            mqttClient.subscribe(roomTopic);
            sendMsg({ type: 'hello', name: myName, inVoice: inVoice });

            document.getElementById('roomTitle').innerText = `Room: ${roomId}`;
            setupScreen.style.display = 'none';
            chatScreen.style.display = 'block';
            updateUI();
            appendSystemMessage("You joined the text chat.");
        });

        mqttClient.on('message', async (topic, payload) => {
            const msg = JSON.parse(payload.toString());

            if (msg.type === 'chat') {
                if (msg.from !== myId) appendChatMessage(msg.name, msg.text, false);
                return;
            }

            if (msg.from === myId) return; // Ignore my own signals
            if (msg.to && msg.to !== myId) return; // Ignore messages directed at others

            // Handle Text Presence
            if (msg.type === 'hello') {
                peers[msg.from] = { name: msg.name, inVoice: msg.inVoice };
                sendMsg({ type: 'welcome', to: msg.from, name: myName, inVoice: inVoice });
                appendSystemMessage(`${msg.name} joined the room.`);
                updateUI();
            }
            else if (msg.type === 'welcome') {
                if (!peers[msg.from]) peers[msg.from] = { name: msg.name };
                peers[msg.from].inVoice = peers[msg.from].inVoice || msg.inVoice;
                updateUI();
            }
            // Handle Voice Presence
            else if (msg.type === 'voice_join') {
                if (peers[msg.from]) peers[msg.from].inVoice = true;
                appendSystemMessage(`${msg.name || 'Someone'} connected to voice.`);
                updateUI();

                if (inVoice) {
                    // Tie-breaker to prevent double WebRTC offers
                    if (myId > msg.from) {
                        setupPeer(msg.from, msg.name, true); 
                    } else {
                        sendMsg({ type: 'voice_welcome', to: msg.from });
                    }
                }
            }
            else if (msg.type === 'voice_welcome') {
                if (peers[msg.from]) peers[msg.from].inVoice = true;
                updateUI();
                if (inVoice && myId > msg.from) {
                    setupPeer(msg.from, msg.name, true);
                }
            }
            // Handle WebRTC Setup
            else if (msg.type === 'offer') {
                const p = setupPeer(msg.from, msg.name, false);
                await p.pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
                flushIceQueue(msg.from);
                const answer = await p.pc.createAnswer();
                await p.pc.setLocalDescription(answer);
                sendMsg({ type: 'answer', to: msg.from, sdp: p.pc.localDescription });
            }
            else if (msg.type === 'answer') {
                const p = setupPeer(msg.from, msg.name, false);
                await p.pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
                flushIceQueue(msg.from);
            }
            else if (msg.type === 'ice') {
                const p = setupPeer(msg.from, msg.name, false);
                if (p.pc.remoteDescription && p.pc.remoteDescription.type) {
                    await p.pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
                } else {
                    p.iceQueue.push(msg.candidate);
                }
            }
            // Handle Global Mute
            else if (msg.type === 'global_mute') {
                if (msg.target === myId) {
                    if (inVoice && !isMuted) {
                        toggleMute();
                        appendSystemMessage("You were globally muted by a peer.");
                    }
                }
            }
            // Handle Leaving
            else if (msg.type === 'leave') {
                appendSystemMessage(`${peers[msg.from]?.name || 'Someone'} left.`);
                removePeer(msg.from);
            }
        });
    };

    // --- 2. JOIN VOICE ---
    joinVoiceBtn.onclick = async () => {
        joinVoiceBtn.disabled = true;
        joinVoiceBtn.innerText = "Requesting Mic...";

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            
            // Set up meter loop
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const localSource = audioCtx.createMediaStreamSource(localStream);
            localAnalyser = audioCtx.createAnalyser();
            localAnalyser.fftSize = 256;
            audioDataArray = new Uint8Array(localAnalyser.frequencyBinCount);
            localSource.connect(localAnalyser);
            requestAnimationFrame(updateMeters);

            inVoice = true;
            joinVoiceBtn.style.display = 'none';
            muteBtn.style.display = 'block';

            sendMsg({ type: 'voice_join', name: myName });
            updateUI();
            appendSystemMessage("You joined the voice channel.");

        } catch (err) {
            console.error(err);
            alert("Could not access microphone.");
            joinVoiceBtn.disabled = false;
            joinVoiceBtn.innerText = "Join Voice";
        }
    };

    // --- WEBRTC LOGIC ---
    function setupPeer(id, name, isInitiator) {
        if (!peers[id]) peers[id] = { name: name || 'Unknown' };
        peers[id].inVoice = true; 

        if (peers[id].pc) return peers[id];

        const pc = new RTCPeerConnection(rtcConfig);
        peers[id].pc = pc;
        peers[id].iceQueue = [];
        peers[id].volume = 1.0;

        if (localStream) {
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        const audioEl = document.createElement('audio');
        audioEl.autoplay = true;
        document.getElementById('audio-container').appendChild(audioEl);
        peers[id].audioEl = audioEl;

        pc.ontrack = event => {
            if (audioEl.srcObject !== event.streams[0]) {
                audioEl.srcObject = event.streams[0];
                try {
                    const remoteSource = audioCtx.createMediaStreamSource(event.streams[0]);
                    const remoteAnalyser = audioCtx.createAnalyser();
                    remoteAnalyser.fftSize = 256;
                    remoteSource.connect(remoteAnalyser);
                    peers[id].analyser = remoteAnalyser;
                } catch (e) { console.log("Could not attach remote analyser", e); }
            }
        };

        pc.onicecandidate = event => {
            if (event.candidate) sendMsg({ type: 'ice', to: id, candidate: event.candidate });
        };

        pc.onconnectionstatechange = () => {
            updateUI();
            if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed' || pc.connectionState === 'closed') {
                if (peers[id]) {
                    peers[id].pc.close();
                    peers[id].pc = null;
                    peers[id].inVoice = false;
                    updateUI();
                }
            }
        };

        if (isInitiator) {
            pc.createOffer()
              .then(offer => pc.setLocalDescription(offer))
              .then(() => sendMsg({ type: 'offer', to: id, sdp: pc.localDescription }));
        }

        updateUI();
        return peers[id];
    }

    function flushIceQueue(id) {
        const p = peers[id];
        if (p && p.iceQueue && p.iceQueue.length > 0) {
            p.iceQueue.forEach(candidate => p.pc.addIceCandidate(new RTCIceCandidate(candidate)));
            p.iceQueue =[];
        }
    }

    function removePeer(id) {
        if (peers[id]) {
            if (peers[id].pc) peers[id].pc.close();
            if (peers[id].audioEl) peers[id].audioEl.remove();
            delete peers[id];
            updateUI();
        }
    }

    function sendMsg(msgObj) {
        msgObj.from = myId;
        if (mqttClient) mqttClient.publish(roomTopic, JSON.stringify(msgObj));
    }

    // --- GLOBAL MUTE FUNCTION ---
    window.sendGlobalMute = function(targetId) {
        sendMsg({ type: 'global_mute', target: targetId });
        appendSystemMessage(`You muted ${peers[targetId]?.name || 'a peer'} for everyone.`);
    };

    // --- VISUAL UI METERS LOOP ---
    function updateMeters() {
        if (!audioCtx || !inVoice) return;

        localAnalyser.getByteFrequencyData(audioDataArray);
        let sum = 0;
        for (let i = 0; i < audioDataArray.length; i++) sum += audioDataArray[i];
        let localVol = Math.min(100, ((sum / audioDataArray.length) / 255) * 100);

        const localMeter = document.getElementById('meter-local');
        if (localMeter) {
            localMeter.style.width = localVol + '%';
            localMeter.style.background = isMuted ? '#d32f2f' : '#4caf50';
        }

        Object.keys(peers).forEach(id => {
            const peerMeter = document.getElementById(`meter-${id}`);
            if (peerMeter && peers[id].analyser) {
                peers[id].analyser.getByteFrequencyData(audioDataArray);
                let pSum = 0;
                for (let i = 0; i < audioDataArray.length; i++) pSum += audioDataArray[i];
                peerMeter.style.width = Math.min(100, ((pSum / audioDataArray.length) / 255) * 100) + '%';
            }
        });

        requestAnimationFrame(updateMeters);
    }

    // --- UI UPDATES ---
    function updateUI() {
        let html = `
            <li>
                <div class="peer-header">
                    <div class="peer-info">
                        <strong>${myName} (You)</strong>
                        <span class="status-badge ${inVoice ? 'voice' : ''}">${inVoice ? 'Voice Active' : 'Text Only'}</span>
                    </div>
                </div>
                ${inVoice ? `
                <div class="meter-bg">
                    <div class="meter-fill local" id="meter-local"></div>
                </div>` : ''}
            </li>
        `;

        Object.keys(peers).forEach(id => {
            const peer = peers[id];
            const isConnected = peer.pc && peer.pc.connectionState === 'connected';
            const badgeText = peer.inVoice ? (isConnected ? 'Voice Active' : 'Connecting...') : 'Text Only';
            const badgeClass = peer.inVoice && isConnected ? 'voice' : '';

            html += `
                <li>
                    <div class="peer-header">
                        <div class="peer-info">
                            <span>${peer.name}</span>
                            <span class="status-badge ${badgeClass}">${badgeText}</span>
                        </div>
                    </div>
                    
                    ${peer.inVoice ? `
                    <div class="meter-bg" style="display: ${isConnected ? 'block' : 'none'};">
                        <div class="meter-fill" id="meter-${id}"></div>
                    </div>
                    <div class="controls-row" style="display: ${isConnected ? 'flex' : 'none'};">
                        <div class="volume-slider-container">
                            <span>🔊</span>
                            <input type="range" min="0" max="1" step="0.01" value="${peer.volume}" class="vol-slider" data-id="${id}">
                        </div>
                        <button class="btn-danger btn-sm" onclick="sendGlobalMute('${id}')">Mute for All</button>
                    </div>
                    ` : ''}
                </li>
            `;
        });

        participantsList.innerHTML = html;

        // Reattach volume slider listeners dynamically
        document.querySelectorAll('.vol-slider').forEach(slider => {
            slider.addEventListener('input', (e) => {
                const id = e.target.getAttribute('data-id');
                const vol = parseFloat(e.target.value);
                if (peers[id]) {
                    peers[id].volume = vol;
                    if (peers[id].audioEl) peers[id].audioEl.volume = vol;
                }
            });
        });
    }

    // --- TEXT CHAT LOGIC ---
    function appendChatMessage(name, text, isSelf) {
        const div = document.createElement('div');
        div.className = `chat-msg ${isSelf ? 'self' : 'other'}`;
        div.innerHTML = `<strong>${isSelf ? "You" : name}</strong>${text}`;
        chatHistory.appendChild(div);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function appendSystemMessage(text) {
        const div = document.createElement('div');
        div.style = "text-align: center; font-size: 12px; color: #888; margin: 4px 0;";
        div.innerText = text;
        chatHistory.appendChild(div);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    sendChatBtn.onclick = () => {
        const text = chatInput.value.trim();
        if (!text) return;
        appendChatMessage(myName, text, true);
        sendMsg({ type: 'chat', name: myName, text: text });
        chatInput.value = '';
    };

    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendChatBtn.click();
    });

    // --- LOCAL MUTE & LEAVE CONTROLS ---
    function toggleMute() {
        isMuted = !isMuted;
        muteBtn.innerText = isMuted ? "Unmute My Mic" : "Mute My Mic";
        muteBtn.className = isMuted ? "btn-danger" : "btn-success";
        if (localStream && localStream.getAudioTracks().length > 0) {
            localStream.getAudioTracks()[0].enabled = !isMuted;
        }
    }

    muteBtn.onclick = toggleMute;

    const disconnect = () => {
        if (mqttClient) {
            sendMsg({ type: 'leave' });
            mqttClient.end();
        }
        Object.keys(peers).forEach(id => removePeer(id));
        if (localStream) localStream.getTracks().forEach(track => track.stop());
        if (audioCtx) audioCtx.close();
        location.reload();
    };

    document.getElementById('leaveBtn').onclick = disconnect;
    window.addEventListener('beforeunload', disconnect);

</script>
</body>
</html>
