<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Serverless Group Voice & Text Chat</title>
    
    <!-- MQTT & Emoji Picker Scripts -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script type="module" src="https://unpkg.com/emoji-picker-element@1"></script>
    
    <style>
        :root {
            --bg-base: #121212;
            --bg-surface: #1e1e1e;
            --bg-input: #2c2c2c;
            --primary: #1976d2;
            --primary-hover: #1565c0;
            --accent: #64b5f6;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --border: #333333;
        }

        html {
            background-color: #000000; /* Dark background outside the 600px app container */
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0 auto; /* Center the app on larger screens */
            padding: 0;
            height: 100vh; /* Fallback for older browsers */
            height: 100dvh; /* Dynamic viewport fixes mobile keyboard/address bar issues */
            width: 100%;
            max-width: 600px; /* Restrict max width to 600px */
            display: flex;
            flex-direction: column;
            color-scheme: dark;
            overflow: hidden; /* Prevent body scrolling */
            box-shadow: 0 0 20px rgba(0,0,0,0.6); /* Add shadow to separate from HTML bg */
            position: relative;
        }

        /* Custom Slim Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }

        input[type="text"], input[type="range"] {
            box-sizing: border-box;
            background-color: var(--bg-input);
            color: #ffffff;
            border: 1px solid var(--border);
            font-size: 15px;
        }
        input[type="text"]::placeholder { color: var(--text-muted); }
        input[type="text"]:focus { outline: 1px solid var(--primary); border-color: transparent; }
        
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #444; color: #777; cursor: not-allowed; }
        
        .btn-danger { background-color: #d32f2f; }
        .btn-danger:hover { background-color: #b71c1c; }
        .btn-success { background-color: #2e7d32; }
        .btn-success:hover { background-color: #1b5e20; }

        /* --- SETUP SCREEN --- */
        #setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        .setup-card {
            background: var(--bg-surface);
            padding: 2.5rem 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .setup-card h1 { margin: 0 0 5px 0; color: var(--accent); text-align: center; font-size: 24px;}
        .setup-card p { margin: 0 0 15px 0; color: var(--text-muted); text-align: center; font-size: 14px;}
        .setup-card input[type="text"] { padding: 12px; border-radius: 8px; width: 100%; }
        .setup-card button { padding: 12px; border-radius: 8px; width: 100%; font-size: 15px; margin-top: 5px;}

        /* --- MAIN CHAT SCREEN --- */
        #chat-screen {
            display: none; /* Changed to flex when active */
            flex-direction: column;
            width: 100%;
            height: 100%;
            background: var(--bg-base);
        }
        
        /* Header */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .top-header h2 { margin: 0; font-size: 16px; font-weight: 600; color: var(--accent); }
        .header-buttons { display: flex; gap: 8px; }
        .header-buttons button { padding: 6px 12px; border-radius: 6px; font-size: 13px; }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            color: var(--text-muted);
            padding: 12px 0;
            font-size: 14px;
            border-radius: 0;
            border-bottom: 2px solid transparent;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.05); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* Layout Panels */
        .main-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-base);
        }
        .panel.active { display: flex; }

        /* --- TEXT CHAT PANEL --- */
        #chatHistory {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-msg {
            padding: 10px 14px;
            border-radius: 16px;
            max-width: 85%;
            font-size: 14.5px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .chat-msg.self {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-msg.other {
            background: var(--bg-surface);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .chat-msg strong { font-size: 12px; display: block; margin-bottom: 4px; opacity: 0.8; font-weight: 600;}
        
        /* Input Area & Emoji Picker */
        .chat-input-wrapper {
            position: relative;
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }
        #emojiBtn {
            background: transparent;
            color: var(--text-muted);
            font-size: 22px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #emojiBtn:hover { color: var(--accent); }
        
        emoji-picker {
            position: absolute;
            bottom: 100%;
            left: 10px;
            margin-bottom: 10px;
            z-index: 1000;
            --background: var(--bg-surface);
            --border-color: var(--border);
            --num-columns: 8;
            border-radius: 12px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.5);
        }

        #chatInput {
            flex: 1;
            border-radius: 20px;
            padding: 10px 16px;
            border: none;
            background: var(--bg-input);
            margin: 0;
        }
        #sendChatBtn {
            border-radius: 20px;
            padding: 8px 18px;
        }

        /* --- VOICE PANEL --- */
        .participant-list {
            padding: 0;
            margin: 0;
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }
        .participant-list li {
            padding: 14px 16px;
            background: var(--bg-base);
            border-bottom: 1px solid var(--border);
        }
        .peer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .peer-info { display: flex; align-items: center; gap: 10px; font-weight: 500;}
        .status-badge {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 12px;
            background: #444;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-badge.voice { background: #388e3c; }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            margin-top: 10px;
        }
        .volume-slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            font-size: 16px;
        }
        .volume-slider-container input[type="range"] { flex: 1; margin: 0; cursor: pointer; }

        .meter-bg {
            width: 100%;
            height: 4px;
            background: var(--bg-surface);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }
        .meter-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.05s ease-out, background-color 0.2s ease;
        }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen">
        <div class="setup-card">
            <h1>Voice & Text</h1>
            <p>Join a serverless P2P mesh network.</p>
            <input type="text" id="userName" placeholder="Your Name" autocomplete="off">
            <input type="text" id="roomId" placeholder="Room ID" autocomplete="off">
            <button id="joinBtn">Join Room</button>
            <p id="statusText" style="display: none; margin: 0; padding-top: 8px;">Connecting...</p>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="chat-screen">
        <div class="top-header">
            <h2 id="roomTitle">Room: ...</h2>
            <div class="header-buttons">
                <button id="joinVoiceBtn" class="btn-success">Join Voice</button>
                <button id="muteBtn" class="btn-success" style="display: none;">Mute Mic</button>
                <button id="leaveBtn" class="btn-danger">Leave</button>
            </div>
        </div>

        <div class="tabs">
            <button id="tab-text" class="tab-btn active">Text Chat</button>
            <button id="tab-voice" class="tab-btn">Voice Audio & Peers</button>
        </div>

        <div class="main-layout">
            <!-- Text Chat Tab -->
            <div id="panel-text" class="panel active">
                <div id="chatHistory"></div>
                <div class="chat-input-wrapper">
                    <button id="emojiBtn">😀</button>
                    <emoji-picker id="emojiPicker" style="display: none;"></emoji-picker>
                    
                    <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off">
                    <button id="sendChatBtn">Send</button>
                </div>
            </div>

            <!-- Voice Tab -->
            <div id="panel-voice" class="panel">
                <ul id="participants" class="participant-list">
                    <!-- Peers inject here -->
                </ul>
            </div>
        </div>
    </div>

<div id="audio-container" style="display: none;"></div>

<script>
    const rtcConfig = { iceServers:[{ urls: 'stun:stun.l.google.com:19302' }] };

    let localStream = null;
    let mqttClient;
    let myId = Math.random().toString(36).substring(2, 12);
    let myName = '';
    let roomTopic = '';

    // Core State
    let inVoice = false;
    let userIntendedMute = false;
    const globallyMutedBy = new Set();
    const peers = {}; 

    // Web Audio API Elements
    let audioCtx;
    let localAnalyser;
    let audioDataArray;

    // UI Elements
    const setupScreen = document.getElementById('setup-screen');
    const chatScreen = document.getElementById('chat-screen');
    const joinBtn = document.getElementById('joinBtn');
    const joinVoiceBtn = document.getElementById('joinVoiceBtn');
    const muteBtn = document.getElementById('muteBtn');
    const roomIdInput = document.getElementById('roomId');
    const statusText = document.getElementById('statusText');
    const participantsList = document.getElementById('participants');
    const chatHistory = document.getElementById('chatHistory');
    const chatInput = document.getElementById('chatInput');
    const sendChatBtn = document.getElementById('sendChatBtn');

    // Emoji Logic
    const emojiBtn = document.getElementById('emojiBtn');
    const emojiPicker = document.getElementById('emojiPicker');
    
    emojiBtn.onclick = () => {
        emojiPicker.style.display = emojiPicker.style.display === 'none' ? 'block' : 'none';
    };

    emojiPicker.addEventListener('emoji-click', event => {
        chatInput.value += event.detail.unicode;
        chatInput.focus();
    });

    // Hide emoji picker if clicking elsewhere
    document.addEventListener('click', (e) => {
        if (e.target !== emojiBtn && !emojiPicker.contains(e.target)) {
            emojiPicker.style.display = 'none';
        }
    });

    // Tabs UI Elements
    const tabText = document.getElementById('tab-text');
    const tabVoice = document.getElementById('tab-voice');
    const panelText = document.getElementById('panel-text');
    const panelVoice = document.getElementById('panel-voice');

    function switchTab(tab) {
        if (tab === 'text') {
            tabText.classList.add('active');
            tabVoice.classList.remove('active');
            panelText.classList.add('active');
            panelVoice.classList.remove('active');
            chatHistory.scrollTop = chatHistory.scrollHeight;
        } else {
            tabVoice.classList.add('active');
            tabText.classList.remove('active');
            panelVoice.classList.add('active');
            panelText.classList.remove('active');
        }
    }
    tabText.onclick = () => switchTab('text');
    tabVoice.onclick = () => switchTab('voice');

    // URL Room Handling
    window.addEventListener('load', () => {
        const roomName = window.location.hash.substring(1);
        if (roomName) roomIdInput.value = decodeURIComponent(roomName);
    });

    roomIdInput.addEventListener('input', () => {
        const val = roomIdInput.value.trim();
        window.history.replaceState(null, null, val ? "#" + encodeURIComponent(val) : window.location.pathname + window.location.search);
    });

    // --- MIC HARDWARE LOGIC ---
    function applyMicState() {
        if (!localStream) return;
        const track = localStream.getAudioTracks()[0];
        if (!track) return;

        const isForcedMuted = globallyMutedBy.size > 0;
        
        if (isForcedMuted) {
            track.enabled = false;
            muteBtn.innerText = "Locked";
            muteBtn.className = "btn-danger";
            muteBtn.disabled = true;
        } else {
            track.enabled = !userIntendedMute;
            muteBtn.disabled = false;
            muteBtn.innerText = userIntendedMute ? "Unmute Mic" : "Mute Mic";
            muteBtn.className = userIntendedMute ? "btn-danger" : "btn-success";
        }
    }

    muteBtn.onclick = () => {
        if (globallyMutedBy.size > 0) return;
        userIntendedMute = !userIntendedMute;
        applyMicState();
    };

    // --- 1. JOIN TEXT CHAT ---
    joinBtn.onclick = () => {
        myName = document.getElementById('userName').value.trim() || "Anonymous";
        const roomId = roomIdInput.value.trim();
        if (!roomId) return alert('Please enter a Room ID.');

        roomTopic = `wrtc-mesh-voice-room-${roomId}`;
        statusText.style.display = 'block';
        joinBtn.disabled = true;

        mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

        mqttClient.on('connect', () => {
            mqttClient.subscribe(roomTopic);
            sendMsg({ type: 'hello', name: myName, inVoice: inVoice });

            document.getElementById('roomTitle').innerText = `# ${roomId}`;
            setupScreen.style.display = 'none';
            chatScreen.style.display = 'flex'; 
            updateUI();
            appendSystemMessage("You joined the room.");
        });

        mqttClient.on('message', async (topic, payload) => {
            const msg = JSON.parse(payload.toString());

            if (msg.type === 'chat') {
                if (msg.from !== myId) appendChatMessage(msg.name, msg.text, false);
                return;
            }

            if (msg.from === myId) return;
            if (msg.to && msg.to !== myId) return;

            if (msg.type === 'hello') {
                peers[msg.from] = { name: msg.name, inVoice: msg.inVoice, globalMuteActive: false };
                sendMsg({ type: 'welcome', to: msg.from, name: myName, inVoice: inVoice });
                appendSystemMessage(`${msg.name} joined the room.`);
                updateUI();
            }
            else if (msg.type === 'welcome') {
                if (!peers[msg.from]) peers[msg.from] = { name: msg.name, globalMuteActive: false };
                peers[msg.from].inVoice = peers[msg.from].inVoice || msg.inVoice;
                updateUI();
            }
            else if (msg.type === 'voice_join') {
                if (peers[msg.from]) peers[msg.from].inVoice = true;
                appendSystemMessage(`${msg.name || 'Someone'} connected to voice.`);
                updateUI();

                if (inVoice) {
                    if (myId > msg.from) {
                        setupPeer(msg.from, msg.name, true); 
                    } else {
                        sendMsg({ type: 'voice_welcome', to: msg.from });
                    }
                }
            }
            else if (msg.type === 'voice_welcome') {
                if (peers[msg.from]) peers[msg.from].inVoice = true;
                updateUI();
                if (inVoice && myId > msg.from) {
                    setupPeer(msg.from, msg.name, true);
                }
            }
            else if (msg.type === 'offer') {
                const p = setupPeer(msg.from, msg.name, false);
                await p.pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
                flushIceQueue(msg.from);
                const answer = await p.pc.createAnswer();
                await p.pc.setLocalDescription(answer);
                sendMsg({ type: 'answer', to: msg.from, sdp: p.pc.localDescription });
            }
            else if (msg.type === 'answer') {
                const p = setupPeer(msg.from, msg.name, false);
                await p.pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
                flushIceQueue(msg.from);
            }
            else if (msg.type === 'ice') {
                const p = setupPeer(msg.from, msg.name, false);
                if (p.pc.remoteDescription && p.pc.remoteDescription.type) {
                    await p.pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
                } else {
                    p.iceQueue.push(msg.candidate);
                }
            }
            else if (msg.type === 'global_mute' && msg.target === myId) {
                if (inVoice) {
                    globallyMutedBy.add(msg.from);
                    appendSystemMessage(`You were muted by ${peers[msg.from]?.name || 'a peer'}.`);
                    applyMicState();
                }
            }
            else if (msg.type === 'global_unmute' && msg.target === myId) {
                if (inVoice) {
                    globallyMutedBy.delete(msg.from);
                    if (globallyMutedBy.size === 0) {
                        appendSystemMessage(`Your mic was unlocked.`);
                    }
                    applyMicState();
                }
            }
            else if (msg.type === 'leave') {
                appendSystemMessage(`${peers[msg.from]?.name || 'Someone'} left.`);
                removePeer(msg.from);
            }
        });
    };

    // --- 2. JOIN VOICE ---
    joinVoiceBtn.onclick = async () => {
        joinVoiceBtn.disabled = true;
        joinVoiceBtn.innerText = "Requesting...";

        try {
            // Updated constraints for Auto Gain Control, Noise Suppression & Echo Cancellation
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    autoGainControl: true,
                    echoCancellation: true,
                    noiseSuppression: true
                }, 
                video: false 
            });
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const localSource = audioCtx.createMediaStreamSource(localStream);
            localAnalyser = audioCtx.createAnalyser();
            localAnalyser.fftSize = 256;
            audioDataArray = new Uint8Array(localAnalyser.frequencyBinCount);
            localSource.connect(localAnalyser);
            requestAnimationFrame(updateMeters);

            inVoice = true;
            joinVoiceBtn.style.display = 'none';
            muteBtn.style.display = 'block';
            
            applyMicState();

            sendMsg({ type: 'voice_join', name: myName });
            updateUI();
            appendSystemMessage("You joined the voice channel.");
            
            switchTab('voice');

        } catch (err) {
            console.error(err);
            alert("Could not access microphone.");
            joinVoiceBtn.disabled = false;
            joinVoiceBtn.innerText = "Join Voice";
        }
    };

    // --- WEBRTC LOGIC ---
    function setupPeer(id, name, isInitiator) {
        if (!peers[id]) peers[id] = { name: name || 'Unknown', globalMuteActive: false };
        peers[id].inVoice = true; 

        if (peers[id].pc) return peers[id];

        const pc = new RTCPeerConnection(rtcConfig);
        peers[id].pc = pc;
        peers[id].iceQueue =[];
        peers[id].volume = 1.0;

        if (localStream) {
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        const audioEl = document.createElement('audio');
        audioEl.autoplay = true;
        document.getElementById('audio-container').appendChild(audioEl);
        peers[id].audioEl = audioEl;

        pc.ontrack = event => {
            if (audioEl.srcObject !== event.streams[0]) {
                audioEl.srcObject = event.streams[0];
                try {
                    const remoteSource = audioCtx.createMediaStreamSource(event.streams[0]);
                    const remoteAnalyser = audioCtx.createAnalyser();
                    remoteAnalyser.fftSize = 256;
                    remoteSource.connect(remoteAnalyser);
                    peers[id].analyser = remoteAnalyser;
                } catch (e) { console.log("Could not attach remote analyser", e); }
            }
        };

        pc.onicecandidate = event => {
            if (event.candidate) sendMsg({ type: 'ice', to: id, candidate: event.candidate });
        };

        pc.onconnectionstatechange = () => {
            updateUI();
            if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed' || pc.connectionState === 'closed') {
                if (peers[id]) {
                    peers[id].pc.close();
                    peers[id].pc = null;
                    peers[id].inVoice = false;
                    updateUI();
                }
            }
        };

        if (isInitiator) {
            pc.createOffer()
              .then(offer => pc.setLocalDescription(offer))
              .then(() => sendMsg({ type: 'offer', to: id, sdp: pc.localDescription }));
        }

        updateUI();
        return peers[id];
    }

    function flushIceQueue(id) {
        const p = peers[id];
        if (p && p.iceQueue && p.iceQueue.length > 0) {
            p.iceQueue.forEach(candidate => p.pc.addIceCandidate(new RTCIceCandidate(candidate)));
            p.iceQueue =[];
        }
    }

    function removePeer(id) {
        if (peers[id]) {
            if (peers[id].pc) peers[id].pc.close();
            if (peers[id].audioEl) peers[id].audioEl.remove();
            
            if (globallyMutedBy.has(id)) {
                globallyMutedBy.delete(id);
                applyMicState();
            }

            delete peers[id];
            updateUI();
        }
    }

    function sendMsg(msgObj) {
        msgObj.from = myId;
        if (mqttClient) mqttClient.publish(roomTopic, JSON.stringify(msgObj));
    }

    window.toggleGlobalMute = function(targetId) {
        if (!peers[targetId]) return;
        
        peers[targetId].globalMuteActive = !peers[targetId].globalMuteActive;
        const isMuting = peers[targetId].globalMuteActive;

        if (isMuting) {
            sendMsg({ type: 'global_mute', target: targetId });
            appendSystemMessage(`You muted ${peers[targetId].name} for everyone.`);
        } else {
            sendMsg({ type: 'global_unmute', target: targetId });
            appendSystemMessage(`You unmuted ${peers[targetId].name}.`);
        }
        
        updateUI();
    };

    // --- VISUAL UI METERS LOOP ---
    function updateMeters() {
        if (!audioCtx || !inVoice) return;

        localAnalyser.getByteFrequencyData(audioDataArray);
        let sum = 0;
        for (let i = 0; i < audioDataArray.length; i++) sum += audioDataArray[i];
        
        const isLocallySilent = userIntendedMute || globallyMutedBy.size > 0;
        const localVol = Math.min(100, ((sum / audioDataArray.length) / 255) * 100);

        const localMeter = document.getElementById('meter-local');
        if (localMeter) {
            localMeter.style.width = (isLocallySilent ? 0 : localVol) + '%';
            localMeter.style.background = isLocallySilent ? '#d32f2f' : '#4caf50';
        }

        Object.keys(peers).forEach(id => {
            const peerMeter = document.getElementById(`meter-${id}`);
            if (peerMeter && peers[id].analyser) {
                peers[id].analyser.getByteFrequencyData(audioDataArray);
                let pSum = 0;
                for (let i = 0; i < audioDataArray.length; i++) pSum += audioDataArray[i];
                peerMeter.style.width = Math.min(100, ((pSum / audioDataArray.length) / 255) * 100) + '%';
            }
        });

        requestAnimationFrame(updateMeters);
    }

    // --- UI UPDATES ---
    function updateUI() {
        let html = `
            <li>
                <div class="peer-header">
                    <div class="peer-info">
                        <span>${myName} (You)</span>
                        <span class="status-badge ${inVoice ? 'voice' : ''}">${inVoice ? 'Voice Active' : 'Text Only'}</span>
                    </div>
                </div>
                ${inVoice ? `
                <div class="meter-bg">
                    <div class="meter-fill" id="meter-local" style="background: #4caf50;"></div>
                </div>` : ''}
            </li>
        `;

        Object.keys(peers).forEach(id => {
            const peer = peers[id];
            const isConnected = peer.pc && peer.pc.connectionState === 'connected';
            const badgeText = peer.inVoice ? (isConnected ? 'Voice Active' : 'Connecting...') : 'Text Only';
            const badgeClass = peer.inVoice && isConnected ? 'voice' : '';
            const isMutedByMe = peer.globalMuteActive;

            html += `
                <li>
                    <div class="peer-header">
                        <div class="peer-info">
                            <span>${peer.name}</span>
                            <span class="status-badge ${badgeClass}">${badgeText}</span>
                        </div>
                    </div>
                    
                    ${peer.inVoice ? `
                    <div class="meter-bg" style="display: ${isConnected ? 'block' : 'none'};">
                        <div class="meter-fill" id="meter-${id}"></div>
                    </div>
                    <div class="controls-row" style="display: ${isConnected ? 'flex' : 'none'};">
                        <div class="volume-slider-container">
                            <span>🔊</span>
                            <input type="range" min="0" max="1" step="0.01" value="${peer.volume}" class="vol-slider" data-id="${id}">
                        </div>
                        <button class="${isMutedByMe ? 'btn-success' : 'btn-danger'} btn-sm" onclick="toggleGlobalMute('${id}')">
                            ${isMutedByMe ? 'Unmute' : 'Mute'}
                        </button>
                    </div>
                    ` : ''}
                </li>
            `;
        });

        participantsList.innerHTML = html;

        document.querySelectorAll('.vol-slider').forEach(slider => {
            slider.addEventListener('input', (e) => {
                const id = e.target.getAttribute('data-id');
                const vol = parseFloat(e.target.value);
                if (peers[id]) {
                    peers[id].volume = vol;
                    if (peers[id].audioEl) peers[id].audioEl.volume = vol;
                }
            });
        });
    }

    // --- TEXT CHAT LOGIC ---
    function appendElementWithSmartScroll(el) {
        const isAtBottom = chatHistory.scrollHeight - chatHistory.scrollTop - chatHistory.clientHeight <= 50;
        chatHistory.appendChild(el);
        if (isAtBottom) {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    }

    function appendChatMessage(name, text, isSelf) {
        const div = document.createElement('div');
        div.className = `chat-msg ${isSelf ? 'self' : 'other'}`;
        div.innerHTML = `<strong>${isSelf ? "You" : name}</strong>${text}`;
        appendElementWithSmartScroll(div);
    }

    function appendSystemMessage(text) {
        const div = document.createElement('div');
        div.style = "text-align: center; font-size: 12px; color: #888; margin: 4px 0;";
        div.innerText = text;
        appendElementWithSmartScroll(div);
    }

    sendChatBtn.onclick = () => {
        const text = chatInput.value.trim();
        if (!text) return;
        appendChatMessage(myName, text, true);
        sendMsg({ type: 'chat', name: myName, text: text });
        chatInput.value = '';
        emojiPicker.style.display = 'none'; // Auto close picker
        chatHistory.scrollTop = chatHistory.scrollHeight;
    };

    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendChatBtn.click();
    });

    const disconnect = () => {
        if (mqttClient) {
            sendMsg({ type: 'leave' });
            mqttClient.end();
        }
        Object.keys(peers).forEach(id => removePeer(id));
        if (localStream) localStream.getTracks().forEach(track => track.stop());
        if (audioCtx) audioCtx.close();
        location.reload();
    };

    document.getElementById('leaveBtn').onclick = disconnect;
    window.addEventListener('beforeunload', disconnect);

</script>
</body>
</html>
